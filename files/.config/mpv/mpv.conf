# Video
profile=high-quality
vo=gpu-next
gpu-api=vulkan
hwdec=vulkan-copy

# Shaders
#glsl-shaders-append="~~/shaders/FSRCNNX_x2_16-0-4-1.glsl"
#glsl-shaders-append="~~/shaders/SSimDownscaler.glsl"
#glsl-shaders-append="~~/shaders/KrigBilateral.glsl"

# Interpolation
blend-subtitles=yes
video-sync=display-resample
interpolation=yes
tscale=oversample

# Audio
volume=50
volume-max=200

# Language
alang=en, eng, english
slang=en, eng, english

# Screenshots
screenshot-format=png
screenshot-png-compression=1
screenshot-template=~/Pictures/%F - %p

# Yt-dlp
script-opts=ytdl_hook-ytdl_path=yt-dlp
ytdl-format=bv*+ba/b

# Misc
keep-open=yes
save-position-on-quit

# Protocols
[protocol.http]
hls-bitrate=max
cache=yes
no-cache-pause
[protocol.https]
profile=protocol.http
[protocol.ytdl]
profile=protocol.http
